name: YouTube Video Sync

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
    inputs:
      manual_video_url:
        description: "Optional YouTube URL to add manually"
        required: false
        default: ""
      manual_video_title:
        description: "Optional manual title override"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  sync-videos:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: python -m pip install --upgrade pip google-api-python-client

      - name: Fetch latest videos
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          YOUTUBE_CHANNEL_HANDLE: "@JuptierFinance8654"
          YOUTUBE_CHANNEL_ID: ${{ vars.YOUTUBE_CHANNEL_ID }}
        run: python scripts/fetch_videos.py

      - name: Add manual video from admin dispatch
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.manual_video_url != '' }}
        run: |
          printf "%s" "${{ inputs.manual_video_url }}" > manual_video_url.txt
          printf "%s" "${{ inputs.manual_video_title }}" > manual_video_title.txt
          python scripts/add_manual_video.py
          rm -f manual_video_url.txt manual_video_title.txt

      - name: Commit and push videos.json
        run: |
          if git diff --quiet -- src/data/videos.json; then
            echo "No changes detected in src/data/videos.json"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/videos.json
          git commit -m "chore: sync latest YouTube videos"
          git push origin HEAD:main
